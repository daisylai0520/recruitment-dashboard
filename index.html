<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招募進度儀表板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  :root {
    --bg: #F7F8FA; --surface: #FFFFFF; --border: #E8EAED;
    --text-primary: #1A1D23; --text-secondary: #6B7280; --text-tertiary: #9CA3AF;
    --amber-bg: #FEF3C7; --amber-text: #92400E;
    --teal-bg: #D1FAE5; --teal-text: #065F46;
    --blue-bg: #DBEAFE; --blue-text: #1E40AF;
    --purple-bg: #EDE9FE; --purple-text: #5B21B6;
    --accent: #4F46E5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

  /* 密碼頁 */
  #lockScreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .lock-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 340px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .lock-icon { font-size: 36px; margin-bottom: 16px; }
  .lock-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .lock-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
  .lock-input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1.5px solid var(--border); border-radius: 8px; outline: none; letter-spacing: 2px; text-align: center; font-family: inherit; }
  .lock-input:focus { border-color: var(--accent); }
  .lock-btn { margin-top: 14px; width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .lock-btn:hover { background: #4338CA; }
  .lock-error { margin-top: 10px; font-size: 12px; color: #EF4444; display: none; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 16px; height: 16px; fill: white; }
  .topbar-title { font-size: 15px; font-weight: 600; }
  .sync-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #10B981; }
  .sync-dot.loading { background: #F59E0B; animation: pulse 1s infinite; }
  .sync-dot.error { background: #EF4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .refresh-btn { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; margin-left: 8px; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

  /* Tab 切換 */
  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab { font-size: 14px; font-weight: 500; padding: 10px 20px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab:hover { color: var(--accent); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .page-hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-hdr-title { font-size: 22px; font-weight: 600; }
  .page-hdr-sub { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; }
  .bu-btn { font-size: 13px; font-weight: 500; padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); cursor: pointer; background: var(--surface); color: var(--text-secondary); transition: all 0.15s; }
  .bu-btn:hover { border-color: var(--accent); color: var(--accent); }
  .bu-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
  .metric { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px 18px; cursor: pointer; transition: all 0.15s; }
  .metric:hover { border-color: var(--accent); }
  .metric.active-filter { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
  .metric-top { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }
  .metric-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .metric-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  .metric-val { font-size: 28px; font-weight: 600; line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }

  .section { margin-bottom: 8px; }
  .section-hdr { display: flex; align-items: center; gap: 10px; padding: 14px 0 10px; }
  .section-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .section-title { font-size: 14px; font-weight: 600; }
  .section-count { font-size: 12px; color: var(--text-tertiary); background: var(--bg); padding: 2px 8px; border-radius: 10px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .card-name { font-size: 15px; font-weight: 600; }
  .card-bu { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 8px; background: var(--bg); color: var(--text-secondary); }
  .card-pos { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
  .card-time { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; padding: 7px 10px; border-radius: 8px; }
  .card-time-icon { font-size: 14px; flex-shrink: 0; }
  .card-time-label { font-weight: 500; margin-bottom: 1px; }
  .t-amber { background: var(--amber-bg); color: var(--amber-text); }
  .t-teal { background: var(--teal-bg); color: var(--teal-text); }
  .t-blue { background: var(--blue-bg); color: var(--blue-text); }
  .t-purple { background: var(--purple-bg); color: var(--purple-text); }
  .divider { height: 1px; background: var(--border); margin: 6px 0 4px; }
  .empty { font-size: 13px; color: var(--text-tertiary); padding: 16px 0; }
  .error-banner { background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 10px; padding: 14px 18px; font-size: 13px; color: #991B1B; margin-bottom: 20px; display: none; }

  /* 電訪記錄表格 */
  .table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
  .pi-table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
  .pi-table th { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; }
  .pi-table td { padding: 11px 14px; border-bottom: 0.5px solid var(--border); color: var(--text-primary); vertical-align: top; }
  .pi-table tr:last-child td { border-bottom: none; }
  .pi-table tr:hover td { background: #F9FAFB; }
  .memo-cell { max-width: 280px; font-size: 12px; color: var(--text-secondary); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 8px; }
  .badge-yes { background: var(--teal-bg); color: var(--teal-text); }
  .badge-no { background: #F3F4F6; color: var(--text-tertiary); }
  .result-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 8px; }
  .r-待排電訪 { background: var(--amber-bg); color: var(--amber-text); }
  .r-待電訪 { background: var(--teal-bg); color: var(--teal-text); }
  .r-待排面試 { background: var(--blue-bg); color: var(--blue-text); }
  .r-待面試 { background: var(--purple-bg); color: var(--purple-text); }
  .r-other { background: #F3F4F6; color: var(--text-tertiary); }
  .table-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }

  @media(max-width:640px) {
    .metrics { grid-template-columns: repeat(2,1fr); }
    .topbar { padding: 0 16px; }
    .container { padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- 密碼鎖定畫面 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">招募儀表板</div>
    <div class="lock-sub">請輸入密碼以繼續</div>
    <input class="lock-input" type="password" id="pwdInput" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')checkPwd()" />
    <button class="lock-btn" onclick="checkPwd()">進入</button>
    <div class="lock-error" id="pwdError">密碼錯誤，請再試一次</div>
  </div>
</div>

<div id="mainContent" style="display:none">
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">
      <svg viewBox="0 0 16 16"><path d="M2 3h12v2H2zM2 7h8v2H2zM2 11h10v2H2z"/></svg>
    </div>
    <span class="topbar-title">招募儀表板</span>
  </div>
  <div style="display:flex;align-items:center">
    <div class="sync-badge">
      <div class="sync-dot loading" id="syncDot"></div>
      <span id="syncText">資料載入中...</span>
    </div>
    <button class="refresh-btn" onclick="fetchData()">↻ 重新整理</button>
  </div>
</div>

<div class="container">

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('progress', this)">📋 招募進度</div>
    <div class="tab" onclick="switchTab('pi', this)">📞 電訪記錄</div>
  </div>

  <!-- 招募進度頁 -->
  <div id="view-progress">
    <div class="page-hdr">
      <div>
        <div class="page-hdr-title">招募進度總覽</div>
        <div class="page-hdr-sub" id="pageSubtitle">正在載入...</div>
      </div>
      <div class="filter-bar" id="filterBar">
        <button class="bu-btn active" onclick="filterBU('all',this)">全部 BU</button>
      </div>
    </div>
    <div class="error-banner" id="errorBanner"></div>
    <div class="metrics">
      <div class="metric" onclick="toggleFilter('待排電訪')" id="m-待排電訪">
        <div class="metric-top"><div class="metric-dot" style="background:#F59E0B"></div><span class="metric-label">待排電訪</span></div>
        <div class="metric-val" id="c-待排電訪">—</div>
        <div class="metric-sub">點擊篩選</div>
      </div>
      <div class="metric" onclick="toggleFilter('待電訪')" id="m-待電訪">
        <div class="metric-top"><div class="metric-dot" style="background:#10B981"></div><span class="metric-label">待電訪</span></div>
        <div class="metric-val" id="c-待電訪">—</div>
        <div class="metric-sub">點擊篩選</div>
      </div>
      <div class="metric" onclick="toggleFilter('待排面試')" id="m-待排面試">
        <div class="metric-top"><div class="metric-dot" style="background:#3B82F6"></div><span class="metric-label">待排面試</span></div>
        <div class="metric-val" id="c-待排面試">—</div>
        <div class="metric-sub">點擊篩選</div>
      </div>
      <div class="metric" onclick="toggleFilter('待面試')" id="m-待面試">
        <div class="metric-top"><div class="metric-dot" style="background:#8B5CF6"></div><span class="metric-label">待面試</span></div>
        <div class="metric-val" id="c-待面試">—</div>
        <div class="metric-sub">點擊篩選</div>
      </div>
    </div>
    <div id="sectionsContainer"></div>
  </div>

  <!-- 電訪記錄頁 -->
  <div id="view-pi" style="display:none">
    <div class="table-hdr">
      <div>
        <div class="page-hdr-title">電訪記錄</div>
        <div class="page-hdr-sub" id="piSubtitle">從 Phone Interview 工作表載入</div>
      </div>
      <div class="filter-bar" id="piFilterBar">
        <button class="bu-btn active" onclick="filterPiBu('all',this)">全部 BU</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="pi-table">
        <thead>
          <tr>
            <th>姓名</th>
            <th>職缺</th>
            <th>電訪時間</th>
            <th style="min-width:220px">Memo</th>
            <th>是否推薦</th>
            <th>已提供給主管</th>
            <th>目前狀態</th>
          </tr>
        </thead>
        <tbody id="piTableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby0h1OkoC_xNWeAAbuh4cBicbTl4B8g1KDtL-s2YK9f80TYjIyxQtdeu9RkWFQVtY3pnw/exec';

const stages = ['待排電訪','待電訪','待排面試','待面試'];
const stageDot  = { '待排電訪':'#F59E0B','待電訪':'#10B981','待排面試':'#3B82F6','待面試':'#8B5CF6' };
const timeCls   = { '待排電訪':'t-amber','待電訪':'t-teal','待排面試':'t-blue','待面試':'t-purple' };
const timeIcon  = { '待排電訪':'📅','待電訪':'📞','待排面試':'📅','待面試':'🗣️' };
const timeLabel = { '待排電訪':'可排電訪時段','待電訪':'電訪時間','待排面試':'可排面試時段','待面試':'面試時間' };

let allData = [];
let piData = [];
let currentBU = 'all';
let currentPiBU = 'all';
let activeFilter = null;
let currentTab = 'progress';

function formatDate(str) {
  if (!str) return '';
  // 嘗試解析各種日期格式
  const d = new Date(str);
  if (isNaN(d.getTime())) return str;
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${yyyy}/${mm}/${dd} ${hh}:${min}`;
}

async function fetchData() {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot loading';
  txt.textContent = '資料載入中...';

  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    allData = (json.candidates || []).filter(d => d.Name && d.Result);
    piData  = (json.piRecords  || []).filter(d => d.Name);

    // BU 篩選按鈕（招募進度）
    const bus = [...new Set(allData.map(d => String(d.BU || '').trim()))].filter(Boolean).sort();
    document.getElementById('filterBar').innerHTML =
      `<button class="bu-btn ${currentBU==='all'?'active':''}" onclick="filterBU('all',this)">全部 BU</button>`
      + bus.map(b => `<button class="bu-btn ${currentBU===b?'active':''}" onclick="filterBU('${b}',this)">BU ${b}</button>`).join('');

    // BU 篩選按鈕（電訪記錄）
    const piBus = [...new Set(piData.map(d => String(d.BU || '').trim()))].filter(Boolean).sort();
    document.getElementById('piFilterBar').innerHTML =
      `<button class="bu-btn ${currentPiBU==='all'?'active':''}" onclick="filterPiBu('all',this)">全部 BU</button>`
      + piBus.map(b => `<button class="bu-btn ${currentPiBU===b?'active':''}" onclick="filterPiBu('${b}',this)">BU ${b}</button>`).join('');

    dot.className = 'sync-dot';
    const now = new Date();
    txt.textContent = `已同步 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    document.getElementById('pageSubtitle').textContent = `共 ${allData.length} 筆人選資料，點擊指標卡片可篩選`;
    document.getElementById('piSubtitle').textContent = `共 ${piData.length} 筆電訪記錄`;
    document.getElementById('errorBanner').style.display = 'none';
    render();
  } catch(e) {
    dot.className = 'sync-dot error';
    txt.textContent = '同步失敗';
    const eb = document.getElementById('errorBanner');
    eb.style.display = 'block';
    eb.textContent = `無法讀取資料：${e.message}`;
  }
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-progress').style.display = tab === 'progress' ? '' : 'none';
  document.getElementById('view-pi').style.display = tab === 'pi' ? '' : 'none';
}

function filterBU(bu, el) {
  currentBU = bu;
  document.querySelectorAll('#filterBar .bu-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderProgress();
}

function filterPiBu(bu, el) {
  currentPiBU = bu;
  document.querySelectorAll('#piFilterBar .bu-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderPiTable();
}

function toggleFilter(stage) {
  activeFilter = activeFilter === stage ? null : stage;
  renderProgress();
}

function getTime(d) {
  if (d.Result === '待電訪' || d.Result === '待排電訪') return d.Interview_date || d.PI_date || '';
  return d.PI_date || d.Interview_date || '';
}

function render() {
  renderProgress();
  renderPiTable();
}

function renderProgress() {
  const filtered = allData.filter(d => currentBU === 'all' || String(d.BU || '').trim() === currentBU);
  stages.forEach(s => {
    document.getElementById('c-' + s).textContent = filtered.filter(d => d.Result === s).length;
    document.getElementById('m-' + s).classList.toggle('active-filter', activeFilter === s);
  });

  const toShow = activeFilter ? [activeFilter] : stages;
  document.getElementById('sectionsContainer').innerHTML = toShow.map((stage, si) => {
    const cands = filtered.filter(d => d.Result === stage);
    const cards = cands.length === 0
      ? `<div class="empty">目前無人選</div>`
      : cands.map(d => {
          const t = formatDate(getTime(d));
          const timeHtml = t
            ? `<div class="card-time ${timeCls[stage]}">
                <span class="card-time-icon">${timeIcon[stage]}</span>
                <div><div class="card-time-label">${timeLabel[stage]}</div><div style="font-size:11px;opacity:0.85;margin-top:1px">${t}</div></div>
               </div>`
            : `<div class="card-time" style="background:#F3F4F6;color:#9CA3AF">
                <span class="card-time-icon">🕐</span>
                <div><div class="card-time-label">尚未排定時間</div></div>
               </div>`;
          return `<div class="card">
            <div class="card-top"><div class="card-name">${d.Name}</div><div class="card-bu">BU ${d.BU}</div></div>
            <div class="card-pos">${d.Position || ''}${d.Source ? ' · ' + d.Source : ''}</div>
            ${timeHtml}
          </div>`;
        }).join('');

    return `<div class="section">
      <div class="section-hdr">
        <div class="section-dot" style="background:${stageDot[stage]}"></div>
        <span class="section-title">${stage}</span>
        <span class="section-count">${cands.length} 人</span>
      </div>
      <div class="cards">${cards}</div>
      ${si < toShow.length - 1 ? '<div class="divider"></div>' : ''}
    </div>`;
  }).join('');
}

function renderPiTable() {
  const filtered = piData.filter(d => currentPiBU === 'all' || String(d.BU || '').trim() === currentPiBU);
  document.getElementById('piSubtitle').textContent = `共 ${filtered.length} 筆電訪記錄`;

  const resultClass = r => {
    if (['待排電訪','待電訪','待排面試','待面試'].includes(r)) return `r-${r}`;
    return 'r-other';
  };

  const yesNo = val => {
    const v = String(val || '').trim();
    const isYes = v === 'Y' || v === 'y' || v === '是' || v === 'yes' || v === 'Yes' || v === 'TRUE' || v === 'true';
    return isYes
      ? `<span class="badge badge-yes">✓ 是</span>`
      : v ? `<span class="badge badge-no">${v}</span>` : `<span class="badge badge-no">—</span>`;
  };

  if (filtered.length === 0) {
    document.getElementById('piTableBody').innerHTML =
      `<tr><td colspan="7" style="text-align:center;color:var(--text-tertiary);padding:24px">目前無電訪記錄</td></tr>`;
    return;
  }

  document.getElementById('piTableBody').innerHTML = filtered.map(d => {
    const memoKey = Object.keys(d).find(k => k.includes('Memo') || k.includes('文案')) || '';
    const recKey  = Object.keys(d).find(k => k.includes('推薦')) || '';
    const provKey = Object.keys(d).find(k => k.includes('提供')) || '';
    const memo = memoKey ? d[memoKey] : '';
    const rec  = recKey  ? d[recKey]  : '';
    const prov = provKey ? d[provKey] : '';

    return `<tr>
      <td style="font-weight:600;white-space:nowrap">${d.Name || ''}</td>
      <td style="white-space:nowrap">${d.Position || ''}</td>
      <td style="white-space:nowrap">${formatDate(d.PI_date || '')}</td>
      <td class="memo-cell">${memo || '<span style="color:var(--text-tertiary)">—</span>'}</td>
      <td>${yesNo(rec)}</td>
      <td>${yesNo(prov)}</td>
      <td><span class="result-badge ${resultClass(d.Result)}">${d.Result || '—'}</span></td>
    </tr>`;
  }).join('');
}

fetchData();
setInterval(fetchData, 5 * 60 * 1000);

// 密碼驗證
function checkPwd() {
  const input = document.getElementById('pwdInput').value;
  if (input === 'WT84498860') {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = '';
    fetchData();
  } else {
    document.getElementById('pwdError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}
